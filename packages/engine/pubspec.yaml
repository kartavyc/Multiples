name: engine
description: Pure-Dart deterministic rules engine for MULTIPLES (finance roguelike).
version: 0.1.0
publish_to: none

environment:
  sdk: ^3.8.0 # json_serializable 6.14 requires >=3.8; toolchain is Dart 3.12.1

# json_annotation is pure Dart (no flutter); content codegen per doc 03 §5.
dependencies:
  json_annotation: ^4.12.0

dev_dependencies:
  build_runner: ^2.4.0
  json_serializable: ^6.8.0
  test: ^1.25.0
