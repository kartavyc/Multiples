<!DOCTYPE html>
<html>
<head>
  <!-- Relative base so the build works from any subpath (itch.io serves the
       game from html-classic.itch.zone/html/<id>/, NOT the domain root; an
       absolute "/" base 404s every asset there). -->
  <base href="./">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="MULTIPLES — an offline finance roguelike. Get in. Get rich. Get out.">
  <meta name="theme-color" content="#07090C">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="MULTIPLES">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>MULTIPLES</title>
  <link rel="manifest" href="manifest.json">

  <!-- Near-black bezel background while the engine loads: no white flash
       (docs/07: bg #07090C on #000, NEVER tinted). -->
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background-color: #07090C;
    }
  </style>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
